# Grafana admin credentials — DEMO PLACEHOLDER, same posture as SESSION_SECRET.
# Not a real secret; rotate for any non-demo use (or source from a secret
# manager). Grafana reads these via GF_SECURITY_ADMIN_USER/PASSWORD env.
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: order-demo
  labels:
    app: grafana
type: Opaque
stringData:
  admin-user: admin
  admin-password: demo-grafana-admin-not-for-production
