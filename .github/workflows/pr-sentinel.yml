name: PR Sentinel Trigger

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  trigger-sentinel:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger TestKube PR Sentinel
        run: |
          curl -X POST \
            "https://api.testkube.io/organizations/tkcorg_b5ace2135f138dc8/environments/tkcenv_362177294460621a/agent/test-workflows/pr-sentinel/executions" \
            -H "Authorization: Bearer ${{ secrets.TESTKUBE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "runningContext": {
                "type": "githubactions",
                "name": "PR #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}"
              }
            }'
