name: Build & Push Image (multi-arch)

# Builds the UI image for linux/amd64 and linux/arm64 and pushes it to GHCR as
# ghcr.io/neuralnimbus22/order-demo-ui:latest. Mirrors the backend repo's
# build-images.yml (same buildx/QEMU/build-push-action approach) — multi-arch
# so the same tag works on Docker Desktop (arm64 Apple Silicon) and GKE
# (amd64 nodes). Single image, so no matrix.

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.ts'
      - 'tsconfig.json'
      - 'postcss.config.mjs'
      - 'Dockerfile'
      - '.github/workflows/build-images.yml'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (for cross-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push order-demo-ui
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/neuralnimbus22/order-demo-ui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
